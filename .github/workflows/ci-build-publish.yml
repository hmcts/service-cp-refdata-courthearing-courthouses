name: CI Build and Publish

on:
  workflow_call:
    secrets:
      AZURE_DEVOPS_ARTIFACT_USERNAME:
        required: true
      AZURE_DEVOPS_ARTIFACT_TOKEN:
        required: true
      HMCTS_ADO_PAT:
        required: true
      CP_VP_AKS_DEPLOY_KEY:
        required: true
        description: "SSH deploy key with write access to hmcts/cp-vp-aks-deploy"
    inputs:
      environment:
        required: true
        type: string
        default: dev
      is_release:
        required: false
        type: boolean
        default: false
      is_publish:
        required: true
        type: boolean
      trigger_docker:
        required: true
        type: boolean
      trigger_deploy:
        required: true
        type: boolean
      deploy_environment:
        required: false
        type: string
        default: dev

jobs:
  Artefact-Version:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    outputs:
      artefact_version: ${{ inputs.is_release && steps.artefact.outputs.release_version || steps.artefact.outputs.draft_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate Artefact Version
        id: artefact
        uses: hmcts/artefact-version-action@v1
        with:
          release: ${{ inputs.is_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  Build:
    needs: [Artefact-Version]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    outputs:
      repo_name: ${{ steps.repo_vars.outputs.repo_name }}
      artefact_name: ${{ steps.repo_vars.outputs.artefact_name }}

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: current

      - name: Gradle Build
        env:
          ARTEFACT_VERSION: ${{ needs.Artefact-Version.outputs.artefact_version }}
        run: |
          echo "Building with ARTEFACT_VERSION=$ARTEFACT_VERSION"
          ./gradlew build -DARTEFACT_VERSION=$ARTEFACT_VERSION

      - name: Extract repo name
        id: repo_vars
        run: |
          repo_name=${GITHUB_REPOSITORY##*/}
          echo "repo_name=${repo_name}" >> $GITHUB_OUTPUT
          echo "artefact_name=${repo_name}-${{ needs.Artefact-Version.outputs.artefact_version }}" >> $GITHUB_OUTPUT

      - name: Upload JAR Artefact
        uses: actions/upload-artifact@v6
        with:
          name: app.jar
          path: build/libs/${{ steps.repo_vars.outputs.artefact_name }}.jar

  Provider-Deploy:
    needs: [ Artefact-Version, Build ]
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          gradle-version: current

      - name: Gradle Publish
        if: ${{ inputs.is_publish }}
        env:
          ARTEFACT_VERSION: ${{ needs.Artefact-Version.outputs.artefact_version }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AZURE_DEVOPS_ARTIFACT_USERNAME: ${{ secrets.AZURE_DEVOPS_ARTIFACT_USERNAME }}
          AZURE_DEVOPS_ARTIFACT_TOKEN: ${{ secrets.AZURE_DEVOPS_ARTIFACT_TOKEN }}
          CP_BACKEND_URL: ${{ secrets.CP_BACKEND_URL }}
          CJSCPPUID: ${{ secrets.CJSCPPUID }}
          ENVIRONMENT: ${{ inputs.environment }}
        run: |
          echo "Active environment=$ENVIRONMENT"
          if [ -z "AZURE_DEVOPS_ARTIFACT_USERNAME" ]; then
            echo "::warning::AZURE_DEVOPS_ARTIFACT_USERNAME is null or not set"
          fi

          if [ -z "$AZURE_DEVOPS_ARTIFACT_TOKEN" ]; then
            echo "::warning::AZURE_DEVOPS_ARTIFACT_TOKEN is null or not set"
          fi

          echo "Publishing artefact for version: $ARTEFACT_VERSION"

          ./gradlew publish \
            -DARTEFACT_VERSION=$ARTEFACT_VERSION \
            -DGITHUB_REPOSITORY=${{ github.repository }} \
            -DGITHUB_ACTOR=${{ github.actor }} \
            -DGITHUB_TOKEN=$GITHUB_TOKEN \
            -DAZURE_DEVOPS_ARTIFACT_USERNAME=$AZURE_DEVOPS_ARTIFACT_USERNAME \
            -DAZURE_DEVOPS_ARTIFACT_TOKEN=$AZURE_DEVOPS_ARTIFACT_TOKEN \
            -DCP_BACKEND_URL=$CP_BACKEND_URL \
            -DCJSCPPUID=$CJSCPPUID

  Build-Docker:
    needs: [ Provider-Deploy, Build, Artefact-Version ]
    if: ${{ inputs.trigger_docker }}
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Download JAR Artefact
        uses: actions/download-artifact@v7
        with:
          name: app.jar
          path: build/libs

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image to GitHub
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.Artefact-Version.outputs.artefact_version }}
          build-args: |
            BASE_IMAGE=eclipse-temurin:21
            JAR_FILENAME=${{ needs.Build.outputs.artefact_name }}.jar
            CP_BACKEND_URL=${{ secrets.CP_BACKEND_URL }}
            CJSCPPUID=${{ secrets.CJSCPPUID }}

  Deploy:
    needs: [Provider-Deploy, Build, Artefact-Version]
    if: ${{ inputs.trigger_deploy }}
    runs-on: ubuntu-latest
    outputs:
      run_id: ${{ steps.trigger.outputs.run_id }}
    steps:
      - name: Extract repo name
        run: echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> $GITHUB_ENV

      - name: Trigger ADO pipeline 460
        id: trigger
        uses: hmcts/trigger-ado-pipeline@v2
        with:
          pipeline_id: 460
          ado_pat: ${{ secrets.HMCTS_ADO_PAT }}
          template_parameters: >
            {
              "GROUP_ID": "uk.gov.hmcts.cp",
              "ARTIFACT_ID": "${{ env.REPO_NAME }}",
              "ARTIFACT_VERSION": "${{ needs.Artefact-Version.outputs.artefact_version }}",
              "TARGET_REPOSITORY": "${{ github.repository }}"
            }

  Wait-For-ACR-Push:
    needs: [Deploy]
    if: ${{ inputs.trigger_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for ADO pipeline 460
        uses: hmcts/monitor-ado-pipeline@v1
        with:
          pipeline_id: 460
          run_id: ${{ needs.Deploy.outputs.run_id }}
          ado_pat: ${{ secrets.HMCTS_ADO_PAT }}
          poll_interval: 30
          timeout: 1800

  Update-Deploy-Config:
    needs: [Wait-For-ACR-Push, Artefact-Version, Build]
    if: ${{ inputs.trigger_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH for deploy repo
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CP_VP_AKS_DEPLOY_KEY }}

      - name: Checkout deploy repo
        run: |
          git clone git@github.com:hmcts/cp-vp-aks-deploy.git deploy-repo

      - name: Setup environment branch
        working-directory: deploy-repo
        run: |
          ENV_BRANCH="env/${{ inputs.deploy_environment }}"
          git fetch origin "${ENV_BRANCH}" || true
          if git rev-parse --verify "origin/${ENV_BRANCH}" >/dev/null 2>&1; then
            git checkout "${ENV_BRANCH}"
            git pull origin "${ENV_BRANCH}"
          else
            git checkout -b "${ENV_BRANCH}"
          fi

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq \
            https://github.com/mikefarah/yq/releases/download/v4.44.1/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update image tag
        working-directory: deploy-repo
        run: |
          SERVICE="${{ needs.Build.outputs.repo_name }}"
          TAG="${{ needs.Artefact-Version.outputs.artefact_version }}"
          echo "Updating ${SERVICE} tag to ${TAG}"
          yq eval ".services.\"${SERVICE}\".image.tag = \"${TAG}\"" \
            -i vp-config/services_values.yml
          cat vp-config/services_values.yml

      - name: Commit and push
        working-directory: deploy-repo
        run: |
          ENV_BRANCH="env/${{ inputs.deploy_environment }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add vp-config/services_values.yml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Update ${{ needs.Build.outputs.repo_name }} to ${{ needs.Artefact-Version.outputs.artefact_version }}"
          git push origin "${ENV_BRANCH}"

  Trigger-K8s-Deploy:
    needs: [Update-Deploy-Config]
    if: ${{ inputs.trigger_deploy }}
    runs-on: ubuntu-latest
    steps:
      - name: Map environment parameters
        id: env_map
        run: |
          case "${{ inputs.deploy_environment }}" in
            dev)
              echo "cpbackendenv=steccm64" >> $GITHUB_OUTPUT
              echo "stack=devamp01" >> $GITHUB_OUTPUT
              echo "cluster=K8-DEV-CS01-CL02" >> $GITHUB_OUTPUT
              ;;
            sit)
              echo "cpbackendenv=sitccm01" >> $GITHUB_OUTPUT
              echo "stack=sitamp01" >> $GITHUB_OUTPUT
              echo "cluster=K8-SIT-CS01-CL02" >> $GITHUB_OUTPUT
              ;;
            prp)
              echo "cpbackendenv=prpccm01" >> $GITHUB_OUTPUT
              echo "stack=prpamp01" >> $GITHUB_OUTPUT
              echo "cluster=K8-PRD-CS01-CL02" >> $GITHUB_OUTPUT
              ;;
            prd)
              echo "cpbackendenv=prdccm01" >> $GITHUB_OUTPUT
              echo "stack=prdamp01" >> $GITHUB_OUTPUT
              echo "cluster=K8-PRD-CS01-CL02" >> $GITHUB_OUTPUT
              ;;
          esac

      - name: Trigger K8s deployment
        uses: hmcts/trigger-ado-pipeline@v2
        with:
          pipeline_id: 434
          ado_pat: ${{ secrets.HMCTS_ADO_PAT }}
          ref_name: refs/heads/env/${{ inputs.deploy_environment }}
          template_parameters: >
            {
              "env": "${{ inputs.deploy_environment }}",
              "cpbackendenv": "${{ steps.env_map.outputs.cpbackendenv }}",
              "stack": "${{ steps.env_map.outputs.stack }}",
              "cluster": "${{ steps.env_map.outputs.cluster }}"
            }
